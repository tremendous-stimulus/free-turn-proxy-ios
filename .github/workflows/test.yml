name: Tests

on:
  push:
    branches:
      - main
      - testing
  pull_request:
    branches:
      - main
      - testing
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Запускаем boot симулятора как можно раньше — миграция данных при первом
      # старте ~1.5 мин, параллельно идут tooling, build framework, build-for-testing.
      - name: Start booting simulator
        id: sim
        run: |
          INFO=$(xcrun simctl list devices available --json \
            | python3 -c "import sys,json; d=json.load(sys.stdin); \
              found=[(v[0]['name'],v[0]['udid']) for k,v in d['devices'].items() if 'iOS' in k and v]; \
              found.sort(key=lambda t: ('iPhone' not in t[0], t[0])); \
              print(found[0][0]); print(found[0][1])")
          NAME=$(echo "$INFO" | head -n1)
          UDID=$(echo "$INFO" | tail -n1)
          echo "Picked: $NAME ($UDID)"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$UDID" || true

      # Версия upstream-фреймворка лежит в Makefile (GO_REF). Берём её оттуда,
      # чтобы test.yml и release.yml шарили один кеш и реагировали на бамп.
      - name: Read GO_REF
        id: goref
        run: |
          REF=$(grep -E '^GO_REF[[:space:]]*\?=' Makefile | sed 's/.*= *//' | tr -d ' ')
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      # actions/cache@v4 сохраняет только при успехе всей job — пока тесты падали,
      # фреймворк не кешировался. Разделяем restore/save: сохраняем сразу после
      # build с if: always(), чтобы кеш жил независимо от тестов.
      - name: Restore Mobile.xcframework cache
        id: cache-fw
        uses: actions/cache/restore@v4
        with:
          path: Frameworks/Mobile.xcframework
          key: mobile-xcframework-${{ steps.goref.outputs.ref }}

      # xcodegen нужен всегда — для генерации .xcodeproj. brew без auto-update
      # быстрее: индексы тянутся минуту, а у нас их и так не используем.
      - name: Install xcodegen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: "1"
        run: brew install xcodegen

      # Go + gomobile + go-task нужны только когда нужно пересобрать framework
      # (cache miss). На cache hit пропускаем 3+ минуты setup-go и brew.
      - name: Set up Go
        if: steps.cache-fw.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: Install gomobile + go-task
        if: steps.cache-fw.outputs.cache-hit != 'true'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: "1"
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          brew install go-task

      - name: Build framework
        if: steps.cache-fw.outputs.cache-hit != 'true'
        run: |
          gomobile init
          make framework

      - name: Save Mobile.xcframework cache
        if: always() && steps.cache-fw.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: Frameworks/Mobile.xcframework
          key: mobile-xcframework-${{ steps.goref.outputs.ref }}

      # ModuleCache — прекомпилированные системные модули (SwiftUI, UIKit,
      # Foundation). Без него каждый build тратит ~60s на их перекомпиляцию.
      - name: Cache Xcode ModuleCache
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: xcode-modulecache-${{ runner.os }}-${{ hashFiles('**/*.swift', 'project.yml') }}
          restore-keys: |
            xcode-modulecache-${{ runner.os }}-

      - name: Generate Xcode project
        run: make project

      # Один билд для обоих наборов тестов — затем test-without-building использует
      # общий derivedDataPath. Без этого xcodebuild test пересобирал бы app дважды.
      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -scheme FreeTurnProxy \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            -derivedDataPath DerivedData \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEBUG_INFORMATION_FORMAT=dwarf \
            ONLY_ACTIVE_ARCH=YES \
            -quiet

      # Дожидаемся симулятора явным шагом — чтобы видеть в логе сколько он реально
      # занял (раньше эти секунды-минуты сидели молча внутри test-without-building).
      - name: Wait for simulator ready
        run: |
          xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b
          echo "Simulator is fully booted."

      # Pre-install app и test-bundle — снимаем эти секунды с test-step,
      # они видны как отдельный пункт в CI.
      - name: Install app and test bundles on simulator
        run: |
          UDID="${{ steps.sim.outputs.udid }}"
          APP="DerivedData/Build/Products/Debug-iphonesimulator/FreeTurnProxy.app"
          UNIT="DerivedData/Build/Products/Debug-iphonesimulator/FreeTurnProxyTests-Runner.app"
          UI="DerivedData/Build/Products/Debug-iphonesimulator/FreeTurnProxyUITests-Runner.app"
          xcrun simctl install "$UDID" "$APP"
          [ -d "$UNIT" ] && xcrun simctl install "$UDID" "$UNIT" || true
          [ -d "$UI" ] && xcrun simctl install "$UDID" "$UI" || true

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -scheme FreeTurnProxy \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath DerivedData \
            -only-testing:FreeTurnProxyTests \
            -resultBundlePath TestResults-unit.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Run UI smoke tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -scheme FreeTurnProxy \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath DerivedData \
            -only-testing:FreeTurnProxyUITests \
            -resultBundlePath TestResults-ui.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults-unit.xcresult
            TestResults-ui.xcresult
