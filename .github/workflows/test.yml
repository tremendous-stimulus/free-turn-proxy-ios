name: Tests

on:
  push:
    branches:
      - main
      - testing
  pull_request:
    branches:
      - main
      - testing
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: ./.github/actions/build-mobile-framework

      # xcbeautify нужен для красивого лога + генерации JUnit XML, который потом
      # рендерит dorny/test-reporter как отдельный check на странице run'а.
      - uses: ./.github/actions/install-xcode-tools
        with:
          packages: xcodegen xcbeautify

      - uses: ./.github/actions/cache-xcode-modulecache

      - run: make project

      - name: Run tests
        run: |
          set -o pipefail
          mkdir -p build/reports
          xcodebuild test \
            -scheme FreeTurnProxy \
            -destination "platform=iOS Simulator,name=iPhone 17" \
            -derivedDataPath DerivedData \
            -resultBundlePath TestResults.xcresult \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            | xcbeautify --report junit --report-path build/reports/junit.xml --renderer github-actions

      # if: always() — рендерим даже если тесты упали (как раз тогда это и нужно).
      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test results
          path: build/reports/junit.xml
          reporter: java-junit
          fail-on-error: false

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
