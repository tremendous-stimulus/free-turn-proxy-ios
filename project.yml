name: FreeTurnProxy
options:
  bundleIdPrefix: com.freeturn
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"

targets:
  FreeTurnProxy:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Info.plist"
          - "Info-Test.plist"
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freeturn.proxy
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        INFOPLIST_FILE: Sources/Info.plist
        ENABLE_BITCODE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: T5LYQB4762
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - framework: Frameworks/Mobile.xcframework
        embed: true
        codeSign: true

  # Тестовая сборка: отдельный bundle id + имя «Free Turn Test» + иконка с
  # плашкой TEST. Ставится рядом с продом, не конфликтует. Используется как
  # локально (схема FreeTurnProxyTest), так и в воркфлоу testing.yml.
  FreeTurnProxyTest:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Info.plist"
          - "Info-Test.plist"
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freeturn.proxy.testing
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        INFOPLIST_FILE: Sources/Info-Test.plist
        ENABLE_BITCODE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIconTest
        DEVELOPMENT_TEAM: T5LYQB4762
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - framework: Frameworks/Mobile.xcframework
        embed: true
        codeSign: true

  # Регресс-тесты (XCTest). Хост — основное приложение. Не подписываются
  # (CODE_SIGNING_ALLOWED=NO) — гоняются на симуляторе.
  FreeTurnProxyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/FreeTurnProxyTests
    dependencies:
      - target: FreeTurnProxy
      - framework: Frameworks/Mobile.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freeturn.proxy.tests
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGNING_ALLOWED: "NO"

  FreeTurnProxyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/FreeTurnProxyUITests
    dependencies:
      - target: FreeTurnProxy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freeturn.proxy.uitests
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGNING_ALLOWED: "NO"

schemes:
  FreeTurnProxy:
    build:
      targets:
        FreeTurnProxy: all
        FreeTurnProxyTests: test
        FreeTurnProxyUITests: test
    test:
      targets:
        - FreeTurnProxyTests
        - FreeTurnProxyUITests
      # Без LLDB: на Xcode 26 RC2 debugger version store падает с ошибкой и ретраит
      # перед каждым тестом — добавляет 30s–3 мин висения. CI debugger не нужен.
      debugEnabled: false
      gatherCoverageData: true
      coverageTargets:
        - FreeTurnProxy
    run:
      config: Debug
    archive:
      config: Release

  FreeTurnProxyTest:
    build:
      targets:
        FreeTurnProxyTest: all
    run:
      config: Debug
    archive:
      config: Release
